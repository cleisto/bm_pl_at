<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>BTC Power Law Monitor</title>
  <!-- React 18 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel Standalone (JSX transpiler) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body { margin: 0; padding: 0; background: #020617; overscroll-behavior: none; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useEffect, useCallback } = React;

// BTC Power Law Monitor v5.3 — live Gold/BTC ratio chart

const GENESIS = new Date("2009-04-06").getTime();
const MS_PER_DAY = 86400000;

const MODELS = {
  floor:   { beta: 5.10,  d: 0.000, targetToday: 56000,   label: "Floor (Q1)",        color: "#22c55e" },
  median:  { beta: 5.60,  d: 0.029, targetToday: 101000,  label: "Median Fair Value",  color: "#f59e0b" },
  ceiling: { beta: 5.90,  d: 0.045, targetToday: 160000,  label: "Obere Begrenzung",   color: "#ef4444" },
};

const SIMPLE_PL = { beta: 4.89, d: 0.0, targetToday: 118000, label: "Einfaches PL", color: "#64748b" };

const OSCILLATION = {
  omega: 8.894, lambda: 2.027, ampDecay: 0.68357,
  harmonics: [
    { n: 1, C: 118.05080, phi: 3.06676 },
    { n: 2, C: 45.27629, phi: 0.04083 },
    { n: 3, C: 17.11566, phi: 3.10856 },
    { n: 4, C: 8.55485, phi: -0.57302 },
  ],
  rSquared: 0.605,
};

const PMI_REGRESSION = { beta: 0.037, alpha: -1.90, rSquared: 0.511 };

const PMI_HISTORY = [
  [2026.04, 50.9], [2026.12, 50.3],
];

function getPmiAdjustedFairValue(pmi, medianFV) {
  return medianFV * Math.exp(PMI_REGRESSION.beta * pmi + PMI_REGRESSION.alpha);
}

function getLatestPmi() { return PMI_HISTORY[PMI_HISTORY.length - 1]; }

function daysSinceGenesis(date = new Date()) {
  return (date.getTime() - GENESIS) / MS_PER_DAY;
}

function powerLawPrice(t, model) {
  const lnT = Math.log(t);
  return Math.exp(model.a + (model.beta - model.d * lnT) * lnT);
}

function oscillationValue(t) {
  const lnT = Math.log(t);
  const damping = Math.pow(t, -OSCILLATION.ampDecay);
  let val = 0;
  for (const h of OSCILLATION.harmonics) {
    val += h.C * damping * Math.cos(h.n * OSCILLATION.omega * lnT + h.phi);
  }
  return val;
}

function powerLawWithOscillation(t, model) {
  return powerLawPrice(t, model) * Math.exp(oscillationValue(t));
}

(function calibrateModels() {
  const tToday = daysSinceGenesis(new Date("2026-03-23"));
  const lnT = Math.log(tToday);
  for (const model of Object.values(MODELS)) {
    model.a = Math.log(model.targetToday) - (model.beta - model.d * lnT) * lnT;
  }
  SIMPLE_PL.a = Math.log(SIMPLE_PL.targetToday) - (SIMPLE_PL.beta - SIMPLE_PL.d * lnT) * lnT;
})();

function getZone(price, fairValue) {
  const ratio = price / fairValue;
  if (ratio < 0.55) return { zone: "DEEP_VALUE",  label: "Deep Value",              color: "#16a34a", bg: "#052e16", action: "DCA verdreifachen" };
  if (ratio < 0.75) return { zone: "ACCUMULATE",  label: "Akkumulation",            color: "#22c55e", bg: "#14532d", action: "DCA verdoppeln" };
  if (ratio < 0.95) return { zone: "UNDERVALUED", label: "Unterbewertet",           color: "#86efac", bg: "#1a3a2a", action: "Normales DCA" };
  if (ratio < 1.15) return { zone: "FAIR",        label: "Fair Value Zone",         color: "#fbbf24", bg: "#422006", action: "Normales DCA" };
  if (ratio < 1.50) return { zone: "OVERVALUED",  label: "Leicht überbewertet",     color: "#f97316", bg: "#431407", action: "DCA reduzieren" };
  if (ratio < 2.00) return { zone: "ELEVATED",    label: "Signifikant überbewertet",color: "#ef4444", bg: "#450a0a", action: "15% trimmen" };
  if (ratio < 3.00) return { zone: "EUPHORIA",    label: "Zyklusreife",             color: "#dc2626", bg: "#450a0a", action: "Weitere 15-20% trimmen" };
  return                    { zone: "EXTREME",     label: "Euphorie-Extreme",        color: "#991b1b", bg: "#450a0a", action: "Aggressive Reduktion" };
}

const fmt = (n) => {
  if (n >= 1e6) return `$${(n / 1e6).toFixed(2)}M`;
  if (n >= 1e3) return `$${(n / 1e3).toFixed(0)}k`;
  return `$${n.toFixed(0)}`;
};

function BTCPowerLawMonitor() {
  const [btcPrice, setBtcPrice] = useState(68500);
  const [goldPrice, setGoldPrice] = useState(3050);
  const [customDate, setCustomDate] = useState(() => new Date().toISOString().split('T')[0]);
  const [showOscillation, setShowOscillation] = useState(true);
  const [autoRefresh, setAutoRefresh] = useState(true);
  const [lastUpdate, setLastUpdate] = useState(null);
  const [fetchStatus, setFetchStatus] = useState('idle');
  const [ratioHistory, setRatioHistory] = useState([]);

  const fetchPrice = useCallback(async () => {
    setFetchStatus('loading');
    try {
      const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,tether-gold&vs_currencies=usd');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (data?.bitcoin?.usd) {
        setBtcPrice(Math.round(data.bitcoin.usd));
        setCustomDate(new Date().toISOString().split('T')[0]);
        setLastUpdate(new Date());
        setFetchStatus('ok');
      }
      if (data?.['tether-gold']?.usd) setGoldPrice(Math.round(data['tether-gold'].usd));
    } catch (err) {
      setFetchStatus('error');
    }
  }, []);

  useEffect(() => { fetchPrice(); }, [fetchPrice]);
  useEffect(() => {
    if (!autoRefresh) return;
    const interval = setInterval(fetchPrice, 60000);
    return () => clearInterval(interval);
  }, [autoRefresh, fetchPrice]);

  const currentDate = new Date(customDate);
  const tNow = daysSinceGenesis(currentDate);
  const fairValue = powerLawPrice(tNow, MODELS.median);
  const floorValue = powerLawPrice(tNow, MODELS.floor);
  const ceilingValue = powerLawPrice(tNow, MODELS.ceiling);
  const oscAdjustedFV = powerLawWithOscillation(tNow, MODELS.median);
  const ratio = btcPrice / fairValue;
  const zone = getZone(btcPrice, fairValue);

  return (
    <div className="min-h-screen bg-slate-950 text-white p-4">
      <div className="max-w-3xl mx-auto space-y-4">
        <div className="text-center">
          <h1 className="text-2xl font-bold text-amber-400">BTC Power Law Monitor</h1>
          <p className="text-slate-400 text-sm">v1.1 — Gold/BTC Ratio + Macro Indicators</p>
        </div>
        <div className="bg-slate-900 rounded-xl p-4 border border-slate-800">
          <div className="grid grid-cols-2 gap-4">
            <div>
              <label className="text-xs text-slate-400">BTC Preis (USD)
                {fetchStatus === 'ok' && <span className="text-green-400 ml-2">● Live</span>}
                {fetchStatus === 'error' && <span className="text-red-400 ml-2">● Offline</span>}
              </label>
              <input type="number" value={btcPrice}
                onChange={(e) => { setBtcPrice(Number(e.target.value)); setAutoRefresh(false); }}
                className="w-full mt-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-lg font-mono text-white" />
            </div>
            <div>
              <label className="text-xs text-slate-400">Datum</label>
              <input type="date" value={customDate}
                onChange={(e) => { setCustomDate(e.target.value); setAutoRefresh(false); }}
                className="w-full mt-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-lg text-white" />
            </div>
          </div>
        </div>
        <div className="bg-slate-900 rounded-xl p-4 border border-slate-800">
          <span className="text-xl font-bold" style={{ color: zone.color }}>{zone.label}</span>
          <p className="text-slate-400 text-sm mt-1">Preis / Fair Value: <span className="text-white font-mono">{(ratio * 100).toFixed(1)}%</span></p>
          <p className="text-sm" style={{ color: zone.color }}>{zone.action}</p>
        </div>
        <div className="grid grid-cols-3 gap-2">
          <div className="bg-slate-900 rounded-xl p-3 text-center">
            <p className="text-xs text-green-400">Floor</p>
            <p className="text-base font-bold text-green-300">{fmt(floorValue)}</p>
          </div>
          <div className="bg-slate-900 rounded-xl p-3 text-center">
            <p className="text-xs text-amber-400">Median</p>
            <p className="text-base font-bold text-amber-300">{fmt(fairValue)}</p>
          </div>
          <div className="bg-slate-900 rounded-xl p-3 text-center">
            <p className="text-xs text-red-400">Ceiling</p>
            <p className="text-base font-bold text-red-300">{fmt(ceilingValue)}</p>
          </div>
        </div>
        <div className="bg-slate-900 rounded-xl p-4 border border-amber-900/30">
          <h2 className="text-sm font-semibold text-amber-300">Gold / BTC</h2>
          <p className="text-slate-400 text-sm">Gold: <span className="text-amber-400">${goldPrice.toLocaleString()}</span> | Ratio: <span className="text-amber-300">{(goldPrice/btcPrice).toFixed(4)}</span></p>
        </div>
        <p className="text-xs text-slate-600 text-center">Kein Finanzprodukt. Modellbasierte Orientierung.</p>
      </div>
    </div>
  );
}

    const rootEl = document.getElementById('root');
    const root = ReactDOM.createRoot(rootEl);
    root.render(React.createElement(BTCPowerLawMonitor));
  </script>
</body>
</html>
